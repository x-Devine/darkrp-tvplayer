<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>DarkRP TV Player</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
  iframe { border: 0; width: 100vw; height: 100vh; display: block; }
  .err { color: #aaa; font-family: sans-serif; padding: 2em; text-align: center; }
</style>
</head>
<body>
<div id="player-container"></div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('id') || '';
  // User can pass &mute=0 to attempt unmuted playback after autoplay starts.
  var wantUnmuted = params.get('mute') !== '1';

  if (!/^[a-zA-Z0-9_-]{6,64}$/.test(id)) {
    document.body.innerHTML = '<div class="err">No video id provided.</div>';
    return;
  }

  // Always start muted — browsers block unmuted autoplay without user gesture.
  // If the caller wants sound, we'll try to unmute after playback begins.
  var src =
    'https://www.youtube.com/embed/' + encodeURIComponent(id) +
    '?autoplay=1' +
    '&mute=1' +
    '&playsinline=1' +
    '&controls=1' +
    '&enablejsapi=1' +
    '&rel=0' +
    '&modestbranding=1' +
    '&iv_load_policy=3';

  var iframe = document.createElement('iframe');
  iframe.setAttribute('src', src);
  iframe.setAttribute('allow', 'autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
  iframe.setAttribute('title', 'YouTube player');
  iframe.id = 'yt-iframe';
  document.getElementById('player-container').appendChild(iframe);

  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    try {
      var player = new YT.Player('yt-iframe', {
        events: {
          'onReady': function (e) {
            try {
              e.target.playVideo();
              // Try to unmute after playback is actually running.
              // Browsers may still refuse, but we can try a few times.
              if (wantUnmuted) {
                var attempts = 0;
                var tryUnmute = function () {
                  attempts++;
                  try {
                    e.target.unMute();
                    e.target.setVolume(100);
                  } catch (err) {}
                  // Check if we're actually unmuted; if not, try again.
                  setTimeout(function () {
                    try {
                      if (e.target.isMuted && e.target.isMuted() && attempts < 5) {
                        tryUnmute();
                      }
                    } catch (err) {}
                  }, 500);
                };
                setTimeout(tryUnmute, 1000);
              }
            } catch (err) {}
          },
          'onStateChange': function (e) {
            // When the video starts playing (state 1), try unmute again.
            if (e.data === 1 && wantUnmuted) {
              try {
                e.target.unMute();
                e.target.setVolume(100);
              } catch (err) {}
            }
          }
        }
      });
    } catch (err) {}
  };
})();
</script>
</body>
</html>
