<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>DarkRP TV Player</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
  iframe { border: 0; width: 100vw; height: 100vh; display: block; }
  .err { color: #aaa; font-family: sans-serif; padding: 2em; text-align: center; }
</style>
</head>
<body>
<div id="player-container"></div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('id') || '';
  var wantUnmuted = params.get('mute') !== '1';
  // Allow caller to override volume. Default 100.
  var volumeParam = parseInt(params.get('volume') || '100', 10);
  if (isNaN(volumeParam) || volumeParam < 0) volumeParam = 100;
  if (volumeParam > 100) volumeParam = 100;

  if (!/^[a-zA-Z0-9_-]{6,64}$/.test(id)) {
    document.body.innerHTML = '<div class="err">No video id provided.</div>';
    return;
  }

  var src =
    'https://www.youtube.com/embed/' + encodeURIComponent(id) +
    '?autoplay=1' +
    '&mute=1' +
    '&playsinline=1' +
    '&controls=1' +
    '&enablejsapi=1' +
    '&rel=0' +
    '&modestbranding=1' +
    '&iv_load_policy=3';

  var iframe = document.createElement('iframe');
  iframe.setAttribute('src', src);
  iframe.setAttribute('allow', 'autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
  iframe.setAttribute('title', 'YouTube player');
  iframe.id = 'yt-iframe';
  document.getElementById('player-container').appendChild(iframe);

  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    try {
      var player = new YT.Player('yt-iframe', {
        events: {
          'onReady': function (e) {
            try { e.target.playVideo(); } catch (err) {}

            if (!wantUnmuted) return;

            // Force unmute + volume repeatedly.
            // Some browsers restore pre-mute volume on unmute (which is 0
            // since we started muted), so we have to keep setting it.
            var ticks = 0;
            var interval = setInterval(function () {
              ticks++;
              try {
                e.target.unMute();
                e.target.setVolume(volumeParam);
              } catch (err) {}
              if (ticks > 10) clearInterval(interval);
            }, 300);
          },
          'onStateChange': function (e) {
            if (!wantUnmuted) return;
            // State 1 = playing. Each time playback starts, reassert volume.
            if (e.data === 1) {
              try {
                e.target.unMute();
                e.target.setVolume(volumeParam);
              } catch (err) {}
              // Also reassert after a short delay, in case YouTube clobbers it.
              setTimeout(function () {
                try {
                  e.target.unMute();
                  e.target.setVolume(volumeParam);
                } catch (err) {}
              }, 500);
            }
          }
        }
      });
    } catch (err) {}
  };
})();
</script>
</body>
</html>
