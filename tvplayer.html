<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>DarkRP TV Player</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    height: 100%;
    width: 100%;
  }
  iframe {
    border: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  .err {
    color: #aaa;
    font-family: sans-serif;
    padding: 2em;
    text-align: center;
  }
</style>
</head>
<body>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('id') || '';

  if (!/^[a-zA-Z0-9_-]{6,64}$/.test(id)) {
    document.body.innerHTML =
      '<div class="err">No video id provided. Usage: ?id=VIDEO_ID</div>';
    return;
  }

  // No autoplay — we want user-gesture (click via sbox's TellMouseButton)
  // to be what starts playback. That lets the audio play unmuted.
  //   autoplay=0  — don't auto-start
  //   mute=0      — unmuted when playback begins
  //   controls=1  — show YouTube's native controls
  //   playsinline=1
  //   rel=0       — no related videos
  //   modestbranding=1
  //   iv_load_policy=3 — hide annotations
  var src =
    'https://www.youtube.com/embed/' + encodeURIComponent(id) +
    '?autoplay=0' +
    '&mute=0' +
    '&playsinline=1' +
    '&controls=1' +
    '&rel=0' +
    '&modestbranding=1' +
    '&iv_load_policy=3';

  var iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.allow =
    'autoplay; accelerometer; clipboard-write; ' +
    'encrypted-media; gyroscope; picture-in-picture; web-share';
  iframe.allowFullscreen = true;
  iframe.referrerPolicy = 'strict-origin-when-cross-origin';
  iframe.title = 'YouTube player';
  document.body.appendChild(iframe);
})();
</script>
</body>
</html>
